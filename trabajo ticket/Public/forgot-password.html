<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Recuperar Contrasena</title>
  <style>
    body { background: #1b2838; color: #c6d4df; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #2a475e; padding: 2rem; border-radius: 8px; width: 360px; }
    h2 { text-align: center; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; background: #1b2838; border: 1px solid #4a90d9; color: #c6d4df; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 0.7rem; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #45a049; }
    .exito { color: #4caf50; text-align: center; margin-top: 1rem; word-break: break-all; font-size: 0.85rem; }
    .error { color: #e74c3c; text-align: center; margin-top: 1rem; }
    a { color: #4a90d9; display: block; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Recuperar Contrasena</h2>
    <input type="email" id="email" placeholder="Correo electronico" />
    <button onclick="solicitar()">Solicitar Token</button>
    <p id="msg"></p>
    <a href="/reset-password.html">Ya tengo un token</a>
    <a href="/login.html">Volver al login</a>
  </div>
  <script>
    const msg = document.getElementById('msg');
    async function solicitar() {
      const email = document.getElementById('email').value;
      const res = await fetch('/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'exito';
        msg.textContent = 'Token: ' + data.resetToken;
      } else {
        msg.className = 'error';
        msg.textContent = data.message || 'Error al solicitar token';
      }
    }
  </script>
</body>
</html>
