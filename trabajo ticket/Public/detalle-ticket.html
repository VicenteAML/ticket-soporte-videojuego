<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Detalle de Ticket</title>
  <style>
    body { background: #1b2838; color: #c6d4df; font-family: Arial, sans-serif; padding: 2rem; }
    h1, h2 { text-align: center; }
    .card { background: #2a475e; padding: 1.5rem; border-radius: 8px; max-width: 600px; margin: 0 auto 1.5rem auto; }
    .info p { margin: 0.5rem 0; }
    .info strong { color: #fff; }
    select, textarea, input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; background: #1b2838; border: 1px solid #4a90d9; color: #c6d4df; border-radius: 4px; box-sizing: border-box; }
    button { padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 0.95rem; margin-right: 0.5rem; }
    .btn-estado { background: #f39c12; }
    .btn-guardar { background: #4caf50; }
    .btn-guardar:hover { background: #45a049; }
    .exito { color: #4caf50; }
    .error { color: #e74c3c; }
    .comentario { background: #1b2838; padding: 0.8rem; border-radius: 6px; margin-bottom: 0.8rem; }
    .comentario small { color: #888; }
    .nav { text-align: center; margin-bottom: 1rem; }
    .nav a { color: #4a90d9; margin: 0 1rem; }
    .campo-tiempo { display: none; }
  </style>
</head>
<body>
  <h1>🎫 Detalle de Ticket</h1>
  <div class="nav">
    <a href="/bandeja.html">← Bandeja</a>
    <a href="/dashboard.html">Dashboard</a>
  </div>
  <div class="card info" id="ticketInfo"><p>Cargando...</p></div>
  <div class="card">
    <h2>Cambiar Estado</h2>
    <select id="nuevoEstado">
      <option value="abierto">Abierto</option>
      <option value="en_proceso">En Proceso</option>
      <option value="cerrado">Cerrado</option>
    </select>
    <div class="campo-tiempo" id="campoTiempo">
      <input type="number" id="tiempoResolucion" placeholder="Tiempo de resolucion (minutos)" />
    </div>
    <button class="btn-estado" onclick="cambiarEstado()">Cambiar Estado</button>
    <p id="msgEstado"></p>
  </div>
  <div class="card">
    <h2>💬 Comentarios</h2>
    <div id="listaComentarios"></div>
    <textarea id="nuevoComentario" placeholder="Escribe un comentario..." rows="3"></textarea>
    <button class="btn-guardar" onclick="agregarComentario()">Comentar</button>
    <p id="msgComentario"></p>
  </div>
  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) window.location.href = '/login.html';
    const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get('id');
    if (!ticketId) window.location.href = '/bandeja.html';

    document.getElementById('nuevoEstado').addEventListener('change', function() {
      document.getElementById('campoTiempo').style.display = this.value === 'cerrado' ? 'block' : 'none';
    });

    async function cargarTicket() {
      const res = await fetch('/tickets/' + ticketId, { headers });
      if (!res.ok) { document.getElementById('ticketInfo').innerHTML = '<p class="error">Ticket no encontrado</p>'; return; }
      const t = await res.json();
      document.getElementById('ticketInfo').innerHTML =
        '<p><strong>Titulo:</strong> ' + t.titulo + '</p>' +
        '<p><strong>Descripcion:</strong> ' + t.descripcion + '</p>' +
        '<p><strong>Categoria:</strong> ' + t.categoria + '</p>' +
        '<p><strong>Estado:</strong> ' + t.estado + '</p>' +
        '<p><strong>Prioridad:</strong> ' + t.prioridad + '</p>' +
        (t.tiempo_resolucion ? '<p><strong>Tiempo resolucion:</strong> ' + t.tiempo_resolucion + ' min</p>' : '');
      document.getElementById('nuevoEstado').value = t.estado;
      if (t.estado === 'cerrado') document.getElementById('campoTiempo').style.display = 'block';
    }

    async function cambiarEstado() {
      const estado = document.getElementById('nuevoEstado').value;
      const body = { estado };
      if (estado === 'cerrado') {
        const tiempo = document.getElementById('tiempoResolucion').value;
        if (tiempo) body.tiempo_resolucion = parseInt(tiempo);
      }
      const res = await fetch('/tickets/' + ticketId, { method: 'PUT', headers, body: JSON.stringify(body) });
      const msgEl = document.getElementById('msgEstado');
      if (res.ok) {
        msgEl.className = 'exito';
        msgEl.textContent = '✅ Estado actualizado';
        cargarTicket();
      } else {
        const data = await res.json();
        msgEl.className = 'error';
        msgEl.textContent = '❌ ' + data.message;
      }
    }

    async function cargarComentarios() {
      const res = await fetch('/comentarios?ticketId=' + ticketId, { headers });
      if (!res.ok) return;
      const comentarios = await res.json();
      const lista = document.getElementById('listaComentarios');
      if (comentarios.length === 0) { lista.innerHTML = '<p>No hay comentarios aun.</p>'; return; }
      lista.innerHTML = '';
      comentarios.forEach(c => {
        lista.innerHTML += '<div class="comentario"><p>' + c.contenido + '</p><small>ID: ' + c.id + '</small></div>';
      });
    }

    async function agregarComentario() {
      const contenido = document.getElementById('nuevoComentario').value;
      const res = await fetch('/comentarios', { method: 'POST', headers, body: JSON.stringify({ contenido, ticketId: parseInt(ticketId) }) });
      const msgEl = document.getElementById('msgComentario');
      if (res.ok) {
        msgEl.className = 'exito';
        msgEl.textContent = '✅ Comentario agregado';
        document.getElementById('nuevoComentario').value = '';
        cargarComentarios();
      } else {
        msgEl.className = 'error';
        msgEl.textContent = '❌ Error al comentar';
      }
    }

    cargarTicket();
    cargarComentarios();
  </script>
</body>
</html>
