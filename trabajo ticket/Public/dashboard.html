<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard — Ticket Soporte</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #1b2838;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: #2a475e;
      padding: 2rem;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      text-align: center;
    }

    h2 { color: #c7d5e0; margin-bottom: 1rem; }
    p { color: #8f98a0; margin-bottom: 2rem; }

    button {
      padding: 0.7rem 2rem;
      background-color: #c0392b;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover { background-color: #a93226; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎮 Bienvenido</h2>
    <p id="usuario">Cargando...</p>
    <button onclick="logout()">Cerrar Sesión</button>
  </div>

  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) {
      window.location.href = '/login.html';
    }

    document.getElementById('usuario').textContent = 'Sesión activa ✅';

    function logout() {
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
