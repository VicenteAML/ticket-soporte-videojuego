<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <style>
    body { background: #1b2838; color: #c6d4df; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #2a475e; padding: 2rem; border-radius: 8px; width: 360px; text-align: center; }
    h2 { margin-bottom: 1rem; }
    .menu { display: flex; flex-direction: column; gap: 0.5rem; margin: 1rem 0; }
    .menu a { color: #c6d4df; background: #1b2838; padding: 0.7rem; border-radius: 4px; text-decoration: none; border: 1px solid #4a90d9; }
    .menu a:hover { background: #4a90d9; color: white; }
    button { padding: 0.7rem 1.5rem; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
    button:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎮 Dashboard</h2>
    <p>✅ Sesion activa</p>
    <div class="menu">
      <a href="/bandeja.html">📬 Bandeja de Tickets</a>
      <a href="/tickets.html">🎫 Gestionar Tickets</a>
      <a href="/comentarios.html">💬 Comentarios</a>
      <a href="/metricas.html">📊 Metricas</a>
    </div>
    <button onclick="logout()">Cerrar Sesion</button>
  </div>
  <script>
    if (!localStorage.getItem('accessToken')) {
      window.location.href = '/login.html';
    }
    function logout() {
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
