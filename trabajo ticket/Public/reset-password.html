<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Restablecer Contrasena</title>
  <style>
    body { background: #1b2838; color: #c6d4df; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #2a475e; padding: 2rem; border-radius: 8px; width: 360px; }
    h2 { text-align: center; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; background: #1b2838; border: 1px solid #4a90d9; color: #c6d4df; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 0.7rem; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #45a049; }
    .exito { color: #4caf50; text-align: center; margin-top: 1rem; }
    .error { color: #e74c3c; text-align: center; margin-top: 1rem; }
    a { color: #4a90d9; display: block; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Restablecer Contrasena</h2>
    <input type="text" id="resetToken" placeholder="Pega tu token aqui" />
    <input type="password" id="newPassword" placeholder="Nueva contrasena" />
    <button onclick="restablecer()">Cambiar Contrasena</button>
    <p id="msg"></p>
    <a href="/login.html">Volver al login</a>
  </div>
  <script>
    const msg = document.getElementById('msg');
    async function restablecer() {
      const resetToken = document.getElementById('resetToken').value;
      const newPassword = document.getElementById('newPassword').value;
      const res = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resetToken, newPassword })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'exito';
        msg.textContent = '✅ ' + data.message;
      } else {
        msg.className = 'error';
        msg.textContent = data.message || 'Error al restablecer';
      }
    }
  </script>
</body>
</html>
