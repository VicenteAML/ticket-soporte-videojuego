<!DOCTYPE html>
  <html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Bandeja de Tickets</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
  
      body {
        background-color: #1b2838;
        color: #c6d4df;
        font-family: Arial, sans-serif;
        padding: 30px;
      }
  
      h1 {
        color: #66c0f4;
        margin-bottom: 20px;
      }
  
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }
  
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
  
      .btn-green {
        background-color: #4caf50;
        color: white;
      }
  
      .btn-green:hover { background-color: #45a049; }
  
      .btn-red {
        background-color: #c0392b;
        color: white;
      }
  
      .btn-red:hover { background-color: #a93226; }
  
      #lista-tickets {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
  
      .ticket-card {
        background-color: #2a475e;
        border-radius: 6px;
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
  
      .ticket-info h3 {
        color: #66c0f4;
        margin-bottom: 4px;
      }
  
      .ticket-info p {
        font-size: 13px;
        color: #a0b4c0;
      }
  
      .ticket-estado {
        padding: 5px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
      }
  
      .estado-abierto { background-color: #4caf50; color: white; }
      .estado-en-proceso { background-color: #f39c12; color: white; }
      .estado-cerrado { background-color: #7f8c8d; color: white; }
  
      #mensaje {
        margin-bottom: 15px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
  
    <div class="top-bar">
      <h1>🎫 Mis Tickets de Soporte</h1>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-green" onclick="window.location.href='/tickets.html'">➕ Nuevo Ticket</button>
        <button class="btn btn-red" onclick="cerrarSesion()">Cerrar Sesión</button>
      </div>
    </div>
  
    <div id="mensaje"></div>
    <div id="lista-tickets"></div>
  
    <script>
      const token = localStorage.getItem('accessToken');
      if (!token) window.location.href = '/login.html';
  
      async function cargarTickets() {
        const res = await fetch('/tickets', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const lista = document.getElementById('lista-tickets');
        const mensaje = document.getElementById('mensaje');
  
        if (!Array.isArray(data) || data.length === 0) {
          mensaje.textContent = 'No tienes tickets registrados.';
          return;
        }
  
        data.forEach(ticket => {
          const card = document.createElement('div');
          card.className = 'ticket-card';
  
          const estadoClase = 'estado-' + ticket.estado.replace(' ', '-');
  
          card.innerHTML = `
            <div class="ticket-info">
              <h3>${ticket.titulo}</h3>
              <p>${ticket.descripcion}</p>
              <p style="margin-top:5px;">📂 ${ticket.categoria}</p>
            </div>
            <span class="ticket-estado ${estadoClase}">${ticket.estado}</span>
          `;
  
          lista.appendChild(card);
        });
      }
  
      function cerrarSesion() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/login.html';
      }
  
      cargarTickets();
    </script>
  
  </body>
  </html>
