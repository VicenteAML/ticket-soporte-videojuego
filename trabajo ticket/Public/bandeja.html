<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Bandeja de Tickets</title>
  <style>
    body { background: #1b2838; color: #c6d4df; font-family: Arial, sans-serif; padding: 2rem; }
    h1 { text-align: center; }
    .filtros { text-align: center; margin: 1rem 0; }
    .filtros select { padding: 0.5rem; background: #2a475e; color: #c6d4df; border: 1px solid #4a90d9; border-radius: 4px; margin: 0 0.5rem; }
    .bandeja { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-top: 2rem; }
    .ticket-card { background: #2a475e; border-radius: 8px; padding: 1.2rem; width: 260px; cursor: pointer; transition: transform 0.2s; }
    .ticket-card:hover { transform: scale(1.03); }
    .ticket-card h3 { margin: 0 0 0.5rem 0; color: #ffffff; }
    .ticket-card p { margin: 0.3rem 0; font-size: 0.9rem; }
    .estado { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; margin-top: 0.5rem; }
    .abierto { background: #4caf50; color: white; }
    .cerrado { background: #e74c3c; color: white; }
    .en_proceso { background: #f39c12; color: white; }
    .prioridad-tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; margin-top: 0.3rem; }
    .p-baja { background: #4caf50; color: white; }
    .p-media { background: #f39c12; color: white; }
    .p-alta { background: #e74c3c; color: white; }
    .error { color: #e74c3c; text-align: center; }
    .nav { text-align: center; margin-bottom: 1rem; }
    .nav a { color: #4a90d9; margin: 0 1rem; }
  </style>
</head>
<body>
  <h1>📬 Bandeja de Tickets</h1>
  <div class="nav">
    <a href="/dashboard.html">← Dashboard</a>
    <a href="/tickets.html">Gestionar Tickets</a>
    <a href="/metricas.html">Metricas</a>
  </div>
  <div class="filtros">
    <select id="filtroEstado" onchange="cargarBandeja()">
      <option value="">Todos los estados</option>
      <option value="abierto">Abierto</option>
      <option value="en_proceso">En Proceso</option>
      <option value="cerrado">Cerrado</option>
    </select>
    <select id="filtroPrioridad" onchange="cargarBandeja()">
      <option value="">Todas las prioridades</option>
      <option value="baja">Baja</option>
      <option value="media">Media</option>
      <option value="alta">Alta</option>
    </select>
  </div>
  <div class="bandeja" id="bandeja"></div>
  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) window.location.href = '/login.html';
    const headers = { 'Authorization': 'Bearer ' + token };

    async function cargarBandeja() {
      const estado = document.getElementById('filtroEstado').value;
      const prioridad = document.getElementById('filtroPrioridad').value;
      let url = '/tickets?';
      if (estado) url += 'estado=' + estado + '&';
      if (prioridad) url += 'prioridad=' + prioridad;
      const res = await fetch(url, { headers });
      if (!res.ok) { document.getElementById('bandeja').innerHTML = '<p class="error">Error al cargar tickets</p>'; return; }
      const data = await res.json();
      const bandeja = document.getElementById('bandeja');
      if (data.length === 0) { bandeja.innerHTML = '<p style="text-align:center">No hay tickets con esos filtros.</p>'; return; }
      bandeja.innerHTML = '';
      data.forEach(t => {
        const est = t.estado || 'abierto';
        const pri = t.prioridad || 'media';
        bandeja.innerHTML +=
          '<div class="ticket-card" onclick="window.location.href=\'/detalle-ticket.html?id=' + t.id + '\'">' +
          '<h3>' + t.titulo + '</h3>' +
          '<p>📂 ' + t.categoria + '</p>' +
          '<p>' + t.descripcion + '</p>' +
          '<span class="estado ' + est + '">' + est + '</span> ' +
          '<span class="prioridad-tag p-' + pri + '">' + pri + '</span>' +
          '</div>';
      });
    }

    cargarBandeja();
  </script>
</body>
</html>
