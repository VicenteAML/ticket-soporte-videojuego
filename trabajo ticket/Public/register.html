<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registro — Ticket Soporte</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #1b2838;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: #2a475e;
      padding: 2rem;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    h2 {
      color: #c7d5e0;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    label {
      color: #c7d5e0;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 0.3rem;
    }

    input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #4a7a9b;
      border-radius: 4px;
      background-color: #1b2838;
      color: #fff;
      margin-bottom: 1rem;
    }

    button {
      width: 100%;
      padding: 0.7rem;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover { background-color: #45a049; }

    #mensaje {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
    }

    .error { color: #ff6b6b; }
    .exito { color: #90ee90; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎮 Crear cuenta</h2>

    <label>Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre" />

    <label>Email</label>
    <input type="email" id="email" placeholder="correo@ejemplo.com" />

    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres" />

    <button onclick="registrar()">Registrarse</button>
    <p style="text-align:center; margin-top:12px;">
    ¿Ya tienes cuenta? <a href="login.html" style="color:#4caf50;">Iniciar sesión</a>
    </p>

    <div id="mensaje"></div>
  </div>

  <script>
    async function registrar() {
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('mensaje');

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          msg.className = 'exito';
          msg.textContent = 'Usuario registrado exitosamente';
        } else {
          msg.className = 'error';
          msg.textContent = 'Usuario no se ha podido registrar';
        }
      } catch (e) {
        msg.className = 'error';
        msg.textContent = 'Error de conexión';
      }
    }
  </script>
</body>
</html>
